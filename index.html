<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="apple-touch-icon" href="./icon-192.png">
  <title>불법광고물 정비</title>
  <style>
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,"Noto Sans KR",sans-serif;background:#f5f5f5;color:#111}
    main{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .card{width:min(440px,100%);background:#fff;border:1px solid #ddd;border-radius:24px;padding:28px;box-shadow:0 10px 30px rgba(0,0,0,.08)}
    h1{font-size:28px;margin:0 0 10px;text-align:center}
    .state{text-align:center;font-size:22px;font-weight:800;margin:22px 0}
    button{width:100%;min-height:112px;border:0;border-radius:22px;background:#111;color:#fff;font-size:27px;font-weight:900;cursor:pointer}
    button:disabled{opacity:.45}
    .status{min-height:48px;margin-top:18px;text-align:center;font-size:17px;line-height:1.5}
    .small{margin-top:16px;text-align:center;color:#666;font-size:13px}
    input{display:none}
  </style>
</head>
<body>
<main>
  <section class="card">
    <h1>불법광고물 정비</h1>
    <div id="state" class="state">정비 전 촬영</div>
    <button id="shoot">📷 사진 촬영</button>
    <input id="camera" type="file" accept="image/*" capture="environment">
    <div id="status" class="status">촬영하면 바로 업로드됩니다.</div>
    <div class="small">전 사진 → 후 사진 순서로 자동 전환</div>
  </section>
</main>
<script>
const CONFIG = {
  // Apps Script 배포 후 아래 주소로 교체하세요.
  endpoint: "https://script.google.com/macros/s/AKfycbxtCup4hBcBqSUvNXqWccrcY8sVh_wVIIiOvPOWq6sWZ0c9Rz8bbwqgAYufHDdIaIwG/exec",
  maxWidth: 1600,
  jpegQuality: 0.82
};

const stateEl = document.querySelector("#state");
const shootBtn = document.querySelector("#shoot");
const camera = document.querySelector("#camera");
const statusEl = document.querySelector("#status");

let phase = localStorage.getItem("phase") || "before";
let caseId = localStorage.getItem("caseId") || makeCaseId();

function makeCaseId(){
  const d = new Date();
  const p = n => String(n).padStart(2,"0");
  return `${d.getFullYear()}${p(d.getMonth()+1)}${p(d.getDate())}_${p(d.getHours())}${p(d.getMinutes())}${p(d.getSeconds())}`;
}
function render(){
  stateEl.textContent = phase === "before" ? "정비 전 촬영" : "정비 후 촬영";
  shootBtn.textContent = phase === "before" ? "📷 전 사진 촬영" : "📷 후 사진 촬영";
}
render();

shootBtn.addEventListener("click", () => camera.click());

camera.addEventListener("change", async () => {
  const file = camera.files?.[0];
  if (!file) return;
  if (CONFIG.endpoint.includes("PASTE_")) {
    statusEl.textContent = "먼저 app.js의 Apps Script 주소를 입력해야 합니다.";
    return;
  }

  shootBtn.disabled = true;
  statusEl.textContent = "사진을 줄이고 업로드하는 중…";

  try {
    const blob = await resizeImage(file, CONFIG.maxWidth, CONFIG.jpegQuality);
    const base64 = await blobToBase64(blob);
    const form = new FormData();
    form.append("caseId", caseId);
    form.append("phase", phase);
    form.append("takenAt", new Date().toISOString());
    form.append("imageBase64", base64.split(",")[1]);
    form.append("mimeType", "image/jpeg");

    // Apps Script 웹앱은 교차 출처 응답 제한이 있어 no-cors로 전송합니다.
    // 전송 요청이 네트워크에 전달되면 화면을 다음 단계로 넘깁니다.
    await fetch(CONFIG.endpoint, { method:"POST", body:form, mode:"no-cors" });

    if (phase === "before") {
      phase = "after";
      localStorage.setItem("phase", phase);
      localStorage.setItem("caseId", caseId);
      statusEl.textContent = "전 사진 전송 완료. 광고물을 제거한 뒤 후 사진을 찍으세요.";
    } else {
      phase = "before";
      caseId = makeCaseId();
      localStorage.setItem("phase", phase);
      localStorage.setItem("caseId", caseId);
      statusEl.textContent = "1건 완료. 다음 정비 전 사진을 찍으세요.";
    }
    render();
  } catch (err) {
    console.error(err);
    statusEl.textContent = "업로드하지 못했습니다. 인터넷 연결을 확인하고 다시 촬영하세요.";
  } finally {
    camera.value = "";
    shootBtn.disabled = false;
  }
});

function blobToBase64(blob){
  return new Promise((resolve,reject)=>{
    const r = new FileReader();
    r.onload = ()=>resolve(r.result);
    r.onerror = reject;
    r.readAsDataURL(blob);
  });
}

function resizeImage(file, maxWidth, quality){
  return new Promise((resolve,reject)=>{
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = ()=>{
      const scale = Math.min(1, maxWidth / img.width);
      const canvas = document.createElement("canvas");
      canvas.width = Math.round(img.width * scale);
      canvas.height = Math.round(img.height * scale);
      canvas.getContext("2d").drawImage(img,0,0,canvas.width,canvas.height);
      canvas.toBlob(blob=>{
        URL.revokeObjectURL(url);
        blob ? resolve(blob) : reject(new Error("이미지 변환 실패"));
      },"image/jpeg",quality);
    };
    img.onerror = reject;
    img.src = url;
  });
}

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("./sw.js");
}
</script>
</body>
</html>
